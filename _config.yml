# Ctrl+Click — Jekyll config for GitHub Pages
# The root index.html has no front matter, so Jekyll copies it through untouched.

title: Ctrl+Click
tagline: Technology Consulting & Support
description: >-
  Notes from ⌃click — AI adoption, secure networking, email migrations,
  cloud infrastructure, and everyday tech, for people, businesses, and their teams
  in the Bay Area.
# url and baseurl are intentionally absent: the GitHub Pages build fills both
# in from the live Pages settings (project path now, custom domain when one is
# configured) — but only when the keys are unset, so don't add them here.
author:
  name: ⌃click

timezone: America/Los_Angeles
markdown: kramdown

permalink: /blog/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

feed:
  posts_limit: 20

# Every post is automatically laid out and bylined — a new post only needs
# a title line at the top of its markdown file.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: ⌃click

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
