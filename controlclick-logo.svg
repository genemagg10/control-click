<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Ctrl+Click logo: a cursor right-clicking open a context menu containing the name">
  <defs>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1D2A40"/>
      <stop offset="1" stop-color="#0C1322"/>
    </linearGradient>
    <linearGradient id="chev" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#14F1C6"/>
      <stop offset="1" stop-color="#6C8CFF"/>
    </linearGradient>
    <linearGradient id="row" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14F1C6" stop-opacity=".16"/>
      <stop offset="1" stop-color="#6C8CFF" stop-opacity=".16"/>
    </linearGradient>
  </defs>

  <!-- color echoes behind the menu (a nod to the Maggio bubble) -->
  <rect x="30" y="20" width="380" height="126" rx="22" fill="#14F1C6" opacity=".55" transform="rotate(-1.6 220 83)"/>
  <rect x="42" y="34" width="380" height="126" rx="22" fill="#FF5C8A" opacity=".5" transform="rotate(1.2 232 97)"/>
  <rect x="24" y="30" width="384" height="128" rx="22" fill="#6C8CFF" opacity=".45" transform="rotate(-0.5 216 94)"/>

  <!-- the context menu -->
  <rect x="36" y="28" width="368" height="122" rx="18" fill="url(#key)" stroke="rgba(255,255,255,.22)" stroke-width="2.5"/>

  <!-- highlighted item: the name -->
  <rect x="52" y="44" width="336" height="56" rx="11" fill="url(#row)" stroke="rgba(20,241,198,.38)" stroke-width="1.5"/>
  <text x="70" y="85" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" letter-spacing="-0.5" fill="#F6F8FC">Ctrl<tspan fill="#FF5C8A" dx="3">+</tspan><tspan fill="url(#chev)" dx="3">Click</tspan></text>

  <!-- quieter items below -->
  <rect x="52" y="114" width="150" height="9" rx="4.5" fill="rgba(255,255,255,.22)"/>
  <rect x="52" y="131" width="96" height="9" rx="4.5" fill="rgba(255,255,255,.13)"/>

  <!-- the cursor, mid right-click at the menu's corner -->
  <g transform="translate(52,152)">
    <path d="M-7 -14 L-13 -21 M-12 -6 L-21 -9 M1 -16 L1 -25"
          fill="none" stroke="#FF5C8A" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 0 L0 34 L9.5 26 L15 38.5 L21.3 35.6 L15.8 23.4 L27.7 22.1 Z"
          fill="#F6F8FC" stroke="#0C1322" stroke-width="3.2" stroke-linejoin="round"/>
  </g>
</svg>
