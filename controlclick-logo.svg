<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 120" role="img" aria-label="Ctrl+Click logo">
  <defs>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1D2A40"/>
      <stop offset="1" stop-color="#0C1322"/>
    </linearGradient>
    <linearGradient id="chev" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#14F1C6"/>
      <stop offset="1" stop-color="#6C8CFF"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g>
    <rect x="6" y="6" width="108" height="108" rx="27" fill="url(#key)" stroke="rgba(255,255,255,.18)" stroke-width="2.5"/>
    <rect x="12" y="12" width="96" height="96" rx="21" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="2"/>
    <path d="M34 58 L60 32 L86 58" fill="none" stroke="url(#chev)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M34 84 L60 58 L86 84" fill="none" stroke="url(#chev)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" opacity=".38"/>
    <g transform="translate(82,82)">
      <path d="M-4 -10 L-7.5 -16.5 M0 -8.5 L0 -16 M-8.5 -4 L-16 -6.5"
            fill="none" stroke="#FF5C8A" stroke-width="3" stroke-linecap="round"/>
      <path d="M0 0 L0 27 L7.6 20.6 L12 30.5 L17 28.2 L12.6 18.6 L22 17.6 Z"
            fill="#F6F8FC" stroke="#0C1322" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="144" y="79" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="54" font-weight="700" letter-spacing="-0.5" fill="#F6F8FC">Ctrl<tspan fill="#FF5C8A" dx="4">+</tspan><tspan fill="url(#chev)" dx="4">Click</tspan></text>
</svg>
