<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Ctrl+Click mark: a cursor right-clicking open a context menu">
  <defs>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1D2A40"/>
      <stop offset="1" stop-color="#0C1322"/>
    </linearGradient>
    <linearGradient id="chev" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#14F1C6"/>
      <stop offset="1" stop-color="#6C8CFF"/>
    </linearGradient>
  </defs>

  <!-- app-icon tile (keycap heritage) -->
  <rect x="6" y="6" width="108" height="108" rx="27" fill="url(#key)" stroke="rgba(255,255,255,.18)" stroke-width="2.5"/>

  <!-- the context menu, revealed -->
  <rect x="26" y="17" width="72" height="78" rx="12" fill="#060B16" stroke="rgba(255,255,255,.30)" stroke-width="3"/>
  <!-- highlighted item: the brand row, carrying the ⌃ -->
  <rect x="34" y="26" width="56" height="23" rx="6" fill="url(#chev)"/>
  <path d="M53 43 L62 33.5 L71 43" fill="none" stroke="#071018" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- quieter items below -->
  <rect x="34" y="59" width="42" height="8" rx="4" fill="rgba(255,255,255,.32)"/>
  <rect x="34" y="75" width="30" height="8" rx="4" fill="rgba(255,255,255,.18)"/>

  <!-- the cursor, mid right-click at the menu's corner -->
  <g transform="translate(34,88)">
    <path d="M-7 -13 L-12.5 -19.5 M-11 -5.5 L-19.5 -8 M1 -15 L1 -23.5"
          fill="none" stroke="#FF5C8A" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 0 L0 32 L9 24.5 L14.1 36.3 L20.1 33.5 L14.9 22 L26.1 20.8 Z"
          fill="#F6F8FC" stroke="#0C1322" stroke-width="3" stroke-linejoin="round"/>
  </g>
</svg>
